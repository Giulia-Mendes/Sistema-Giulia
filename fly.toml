app = "alery"
primary_region = "gru"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[mounts]]
  source = "dados"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/"
    timeout = "90s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
